<!DOCTYPE html>

<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>The Brief · Indian News</title>
<style>
/* ═══════════════ TOKENS ═══════════════ */
:root {
  --bg:       #f5efe0; --bg2:#ede5cc; --surface:#ffffff;
  --ink:      #1a1410; --ink2:#3d3428; --ink3:#7a6e5c;
  --border:   #d8ccb0; --border2:#c8b99a;
  --accent:   #c8291a; --accent2:#e04030;
  --ap:       #8a6c00; --tg:#1a4a8a; --ai:#6b21a8;
  --green:    #166534; --muted:#9ca3af;
  --tab-h:    56px;    --hdr-h:56px;
  --shadow:   0 1px 3px rgba(0,0,0,.1);
  --shadow2:  0 4px 16px rgba(0,0,0,.12);
  --radius:   10px;
  --font-body:'Georgia',serif;
  --font-ui:  -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'Fira Code','Courier New',monospace;
}
[data-theme="dark"] {
  --bg:#0f0f0f; --bg2:#1a1a1a; --surface:#1e1e1e;
  --ink:#e8e0d0; --ink2:#c0b8a8; --ink3:#7a7268;
  --border:#2a2a2a; --border2:#333;
  --shadow:0 1px 3px rgba(0,0,0,.4); --shadow2:0 4px 16px rgba(0,0,0,.5);
}

/* ═══════════════ RESET ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(–bg);color:var(–ink);font-family:var(–font-body);line-height:1.5;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none}
a{color:inherit;text-decoration:none}
input{font-family:var(–font-ui)}
img{max-width:100%;display:block}

/* ═══════════════ APP SHELL ═══════════════ */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:1440px;margin:0 auto}

/* ─── TOP HEADER ─── */
#hdr{
position:sticky;top:0;z-index:200;
background:var(–surface);border-bottom:1px solid var(–border);
box-shadow:var(–shadow);
height:var(–hdr-h);
display:flex;align-items:center;gap:10px;
padding:0 14px;
}
.brand{
font-family:‘Georgia’,serif;font-size:1.4rem;font-weight:700;
letter-spacing:-1px;white-space:nowrap;
}
.brand span{color:var(–accent)}

.hdr-search{
flex:1;display:flex;align-items:center;gap:8px;
background:var(–bg2);border:1px solid var(–border);
border-radius:20px;padding:6px 12px;
}
.hdr-search input{
flex:1;border:none;background:transparent;outline:none;
font-size:.85rem;color:var(–ink);
}
.hdr-search input::placeholder{color:var(–ink3)}
.hdr-search svg{width:16px;height:16px;stroke:var(–ink3);flex-shrink:0}

.hdr-btns{display:flex;gap:6px;align-items:center}
.icon-btn{
width:36px;height:36px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:var(–bg2);border:1px solid var(–border);
transition:background .15s;position:relative;
}
.icon-btn:hover{background:var(–border)}
.icon-btn svg{width:18px;height:18px;stroke:var(–ink);fill:none}

#bm-badge{
position:absolute;top:-2px;right:-2px;
background:var(–accent);color:#fff;
font-size:.55rem;font-family:var(–font-ui);
width:16px;height:16px;border-radius:50%;
display:none;align-items:center;justify-content:center;
}

/* ─── KEY BANNER ─── */
#key-banner{
background:#fef3c7;border-bottom:1px solid #fde68a;
padding:8px 14px;display:flex;align-items:center;gap:10px;
font-family:var(–font-ui);font-size:.78rem;color:#92400e;
}
[data-theme=“dark”] #key-banner{background:#2a1f00;border-color:#3a2e00;color:#fbbf24}
#key-banner a{text-decoration:underline;cursor:pointer;font-weight:600}
#key-banner.hidden{display:none}

/* ─── KEY DRAWER ─── */
#key-drawer{
background:var(–bg2);border-bottom:1px solid var(–border);
overflow:hidden;max-height:0;transition:max-height .3s ease;
}
#key-drawer.open{max-height:80px}
.key-row{padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.key-row label{font-family:var(–font-ui);font-size:.75rem;color:var(–ink2);white-space:nowrap}
#groq-input{
flex:1;min-width:200px;max-width:400px;
background:var(–surface);border:1px solid var(–border2);
color:var(–ink);font-family:var(–font-mono);font-size:.72rem;
padding:7px 10px;border-radius:6px;outline:none;transition:border-color .2s;
}
#groq-input:focus{border-color:var(–accent)}
#groq-input::placeholder{color:var(–muted)}
.btn-save{padding:7px 14px;background:var(–accent);color:#fff;border-radius:6px;font-family:var(–font-ui);font-size:.75rem;font-weight:600;transition:background .15s}
.btn-save:hover{background:var(–accent2)}
.btn-clr{padding:7px 10px;color:var(–accent);border:1px solid var(–accent);border-radius:6px;font-family:var(–font-ui);font-size:.75rem;transition:all .15s}
.btn-clr:hover{background:var(–accent);color:#fff}

/* ─── TAB STRIP ─── */
#tab-strip{
position:sticky;top:var(–hdr-h);z-index:150;
background:var(–surface);border-bottom:2px solid var(–border);
display:flex;overflow-x:auto;scrollbar-width:none;
-webkit-overflow-scrolling:touch;
}
#tab-strip::-webkit-scrollbar{display:none}
.tab{
padding:0 16px;height:44px;display:flex;align-items:center;gap:6px;
font-family:var(–font-ui);font-size:.75rem;font-weight:500;
color:var(–ink3);white-space:nowrap;
border-bottom:2px solid transparent;margin-bottom:-2px;
transition:color .15s,border-color .15s;flex-shrink:0;
}
.tab:hover{color:var(–ink)}
.tab.active{color:var(–accent);border-bottom-color:var(–accent)}
.tab[data-r=ap].active{color:var(–ap);border-bottom-color:var(–ap)}
.tab[data-r=tg].active{color:var(–tg);border-bottom-color:var(–tg)}
.tab[data-r=ai].active{color:var(–ai);border-bottom-color:var(–ai)}
.tab-dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:none}
.tab.loading .tab-dot{display:block;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.tab-count{
font-size:.6rem;background:var(–bg2);
padding:1px 5px;border-radius:10px;min-width:18px;text-align:center;
font-family:var(–font-ui);
}

/* ─── MAIN CONTENT ─── */
#content-wrap{flex:1;padding-bottom:20px}

/* Section header */
.sec-hdr{
display:flex;align-items:center;gap:10px;
padding:16px 14px 10px;border-bottom:1px solid var(–border);
}
.sec-title{
font-family:‘Georgia’,serif;font-size:1.1rem;font-weight:700;
font-style:italic;color:var(–ink2);
}
.sec-meta{font-family:var(–font-ui);font-size:.7rem;color:var(–muted);margin-left:auto}
.sec-src{font-family:var(–font-mono);font-size:.6rem;color:var(–muted);display:none}
@media(min-width:600px){.sec-src{display:block}}
.btn-refresh{
padding:5px 10px;border-radius:6px;
font-family:var(–font-ui);font-size:.72rem;
background:var(–bg2);border:1px solid var(–border);
color:var(–ink2);transition:all .15s;
}
.btn-refresh:hover{background:var(–border);color:var(–ink)}

/* ─── HERO CARD ─── */
.hero-card{
margin:12px;border-radius:var(–radius);
background:var(–surface);box-shadow:var(–shadow2);
overflow:hidden;border:1px solid var(–border);
}
.hero-body{padding:16px}
.hero-cat{
display:flex;align-items:center;gap:8px;flex-wrap:wrap;
margin-bottom:10px;
}
.hero-headline{
font-family:‘Georgia’,serif;font-size:1.35rem;font-weight:700;
line-height:1.28;color:var(–ink);margin-bottom:10px;
}
.hero-desc{
font-size:.88rem;line-height:1.72;color:var(–ink2);
margin-bottom:14px;
}
@media(min-width:768px){.hero-headline{font-size:1.7rem}}

/* ─── ARTICLE GRID ─── */
.art-grid{
display:grid;
grid-template-columns:1fr;
gap:1px;background:var(–border);
margin:0 12px;
border:1px solid var(–border);border-radius:var(–radius);
overflow:hidden;
}
@media(min-width:600px){.art-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.art-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){.art-grid{grid-template-columns:repeat(4,1fr)}}

.art-card{
background:var(–surface);padding:14px;
display:flex;flex-direction:column;gap:8px;
animation:fadeUp .3s ease backwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.art-card:hover{background:var(–bg2);transition:background .15s}

.art-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.art-headline{
font-family:‘Georgia’,serif;font-size:.95rem;font-weight:700;
line-height:1.35;color:var(–ink);flex:1;
}
.art-desc{
font-size:.78rem;line-height:1.62;color:var(–ink3);
display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}

/* ─── ACTIONS ─── */
.art-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:10px;border-top:1px solid var(–border)}
.btn-ai{
padding:6px 12px;border-radius:6px;
font-family:var(–font-ui);font-size:.7rem;font-weight:600;
background:var(–ink);color:var(–bg);
display:inline-flex;align-items:center;gap:5px;
transition:all .15s;
}
.btn-ai:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.2)}
.btn-ai:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ai.r-ap{background:var(–ap)}
.btn-ai.r-tg{background:var(–tg)}
.btn-ai.r-ai{background:var(–ai)}
.btn-read{
padding:6px 12px;border-radius:6px;
font-family:var(–font-ui);font-size:.7rem;font-weight:500;
background:var(–bg2);border:1px solid var(–border);color:var(–ink2);
display:inline-flex;align-items:center;gap:5px;transition:all .15s;
}
.btn-read:hover{background:var(–border)}
.btn-bm{
padding:6px 10px;border-radius:6px;
font-family:var(–font-ui);font-size:.7rem;
background:transparent;border:1px solid var(–border);color:var(–ink3);
transition:all .15s;margin-left:auto;
}
.btn-bm:hover{border-color:var(–ap);color:var(–ap)}
.btn-bm.saved{background:#fef3c7;border-color:#d97706;color:#92400e}
[data-theme=“dark”] .btn-bm.saved{background:#2a1f00;border-color:#d97706;color:#fbbf24}

/* ─── BADGES ─── */
.lang-badge{
display:inline-flex;align-items:center;
font-family:var(–font-mono);font-size:.55rem;font-weight:500;
padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap;
}
.lb-te{color:#7a5c00;background:#fef9c3;border-color:#ca8a04}
.lb-en{color:#166534;background:#f0fdf4;border-color:#86efac}
[data-theme=“dark”] .lb-te{background:#2a1f00;color:#fbbf24}
[data-theme=“dark”] .lb-en{background:#052e16;color:#86efac}

.cat-badge{
display:inline-flex;align-items:center;
font-family:var(–font-ui);font-size:.6rem;font-weight:600;
padding:2px 7px;border-radius:4px;
letter-spacing:.04em;text-transform:uppercase;
}
.cat-world{background:#ede9fe;color:#5b21b6}
.cat-india{background:#fff7ed;color:#c2410c}
.cat-ap   {background:#fefce8;color:#a16207}
.cat-tg   {background:#eff6ff;color:#1d4ed8}
.cat-sport{background:#fef2f2;color:#b91c1c}
.cat-biz  {background:#f0fdf4;color:#166534}
.cat-health{background:#fdf4ff;color:#7e22ce}
.cat-ai   {background:#f5f3ff;color:#5b21b6}
[data-theme=“dark”] .cat-world{background:#1e1b4b;color:#a5b4fc}
[data-theme=“dark”] .cat-india{background:#431407;color:#fdba74}
[data-theme=“dark”] .cat-ap   {background:#1c1400;color:#fde047}
[data-theme=“dark”] .cat-tg   {background:#0c1a3a;color:#93c5fd}
[data-theme=“dark”] .cat-sport{background:#3b0000;color:#fca5a5}
[data-theme=“dark”] .cat-biz  {background:#052e16;color:#86efac}
[data-theme=“dark”] .cat-health{background:#2e1065;color:#d8b4fe}
[data-theme=“dark”] .cat-ai   {background:#2e1065;color:#d8b4fe}

.src-badge{
font-family:var(–font-mono);font-size:.58rem;color:var(–muted);
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;
}
.date-badge{font-family:var(–font-mono);font-size:.58rem;color:var(–muted)}

/* ─── AI PANEL ─── */
.ai-panel{
background:var(–bg2);border:1px solid var(–border2);
border-left:3px solid var(–ink);border-radius:0 6px 6px 0;
padding:10px 12px;animation:fadeIn .25s ease;
}
.ai-panel.r-ap{border-left-color:var(–ap)}
.ai-panel.r-tg{border-left-color:var(–tg)}
.ai-panel.r-ai{border-left-color:var(–ai)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.ai-hdr{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:7px;
}
.ai-tag{font-family:var(–font-ui);font-size:.62rem;font-weight:700;color:var(–ink2);text-transform:uppercase;letter-spacing:.06em}
.ai-model{font-family:var(–font-mono);font-size:.55rem;color:var(–muted)}
.ai-text{font-family:‘Georgia’,serif;font-size:.82rem;line-height:1.72;color:var(–ink2);font-style:italic}

/* ─── SKELETON ─── */
.skeleton-wrap{padding:12px;display:flex;flex-direction:column;gap:12px}
.skel-hero{border-radius:var(–radius);height:220px;overflow:hidden}
.skel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;border-radius:var(–radius);overflow:hidden}
@media(min-width:600px){.skel-grid{grid-template-columns:repeat(3,1fr)}}
.skel-card{height:160px}
.skel{
background:linear-gradient(90deg,var(–bg2) 25%,var(–border) 50%,var(–bg2) 75%);
background-size:200% 100%;animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─── ERROR / EMPTY ─── */
.state-box{
padding:60px 24px;text-align:center;
display:flex;flex-direction:column;align-items:center;gap:12px;
}
.state-icon{font-size:2.5rem}
.state-title{font-family:‘Georgia’,serif;font-size:1.1rem;font-weight:700;color:var(–ink)}
.state-msg{font-family:var(–font-ui);font-size:.82rem;color:var(–ink3);line-height:1.7}
.state-btn{
padding:8px 18px;border-radius:20px;
background:var(–accent);color:#fff;
font-family:var(–font-ui);font-size:.82rem;font-weight:600;
margin-top:6px;transition:background .15s;
}
.state-btn:hover{background:var(–accent2)}

/* ─── BOOKMARKS DRAWER ─── */
#bm-drawer{
position:fixed;inset:0;z-index:500;display:none;
}
#bm-drawer.open{display:flex}
.bm-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.bm-panel{
position:absolute;right:0;top:0;bottom:0;width:min(360px,100vw);
background:var(–surface);display:flex;flex-direction:column;
box-shadow:-4px 0 20px rgba(0,0,0,.2);overflow:hidden;
}
.bm-hdr{
padding:16px;border-bottom:1px solid var(–border);
display:flex;align-items:center;justify-content:space-between;
}
.bm-title{font-family:‘Georgia’,serif;font-size:1rem;font-weight:700}
.bm-close{font-size:1.2rem;width:32px;height:32px;border-radius:50%;background:var(–bg2);display:flex;align-items:center;justify-content:center}
.bm-list{flex:1;overflow-y:auto;padding:8px}
.bm-item{
padding:12px;border-radius:8px;margin-bottom:6px;
background:var(–bg2);border:1px solid var(–border);
display:flex;flex-direction:column;gap:6px;
}
.bm-item-title{font-family:‘Georgia’,serif;font-size:.88rem;font-weight:700;color:var(–ink);line-height:1.35}
.bm-item-meta{font-family:var(–font-ui);font-size:.7rem;color:var(–muted);display:flex;gap:8px;align-items:center}
.bm-item-actions{display:flex;gap:6px}
.bm-empty{padding:40px;text-align:center;color:var(–muted);font-family:var(–font-ui);font-size:.85rem}

/* ─── KEY MODAL ─── */
#key-modal{
position:fixed;inset:0;z-index:600;display:none;
align-items:flex-end;justify-content:center;
background:rgba(0,0,0,.5);
}
#key-modal.open{display:flex}
.key-sheet{
width:100%;max-width:480px;background:var(–surface);
border-radius:16px 16px 0 0;padding:20px;
display:flex;flex-direction:column;gap:12px;
}
@media(min-width:520px){
#key-modal{align-items:center}
.key-sheet{border-radius:16px}
}
.key-sheet h3{font-family:‘Georgia’,serif;font-size:1rem;font-weight:700}
.key-sheet p{font-family:var(–font-ui);font-size:.8rem;color:var(–ink3);line-height:1.6}
.key-sheet input{
width:100%;background:var(–bg2);border:1px solid var(–border2);
color:var(–ink);font-family:var(–font-mono);font-size:.8rem;
padding:10px 12px;border-radius:8px;outline:none;
}
.key-sheet input:focus{border-color:var(–accent)}
.key-sheet-btns{display:flex;gap:8px}
.key-sheet-btns .btn-save{flex:1;padding:10px}
.key-close{
position:absolute;top:14px;right:14px;
width:28px;height:28px;border-radius:50%;
background:var(–bg2);display:flex;align-items:center;justify-content:center;
font-size:.9rem;
}

/* ─── SEARCH RESULTS MODE ─── */
#search-results{padding:12px;display:none}
#search-results.show{display:block}
.search-hdr{padding:0 0 10px;font-family:var(–font-ui);font-size:.8rem;color:var(–muted)}

/* ─── TOAST ─── */
#toast{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
background:var(–ink);color:var(–bg);
font-family:var(–font-ui);font-size:.8rem;
padding:10px 18px;border-radius:20px;
opacity:0;transition:all .25s;z-index:800;white-space:nowrap;
pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── SPINNER ─── */
.spin{display:inline-block;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}

/* ─── DESKTOP LAYOUT ─── */
@media(min-width:768px){
#content-wrap{display:grid;grid-template-columns:1fr}
}
</style>

</head>
<body>
<div id="app">

<!-- ═══ HEADER ═══ -->

<header id="hdr">
  <div class="brand">BRIEF<span>.</span></div>

  <div class="hdr-search">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search-input" placeholder="Search articles…" autocomplete="off"/>
  </div>

  <div class="hdr-btns">
    <button class="icon-btn" id="bm-btn" title="Bookmarks" onclick="openBM()">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span id="bm-badge"></span>
    </button>
    <button class="icon-btn" id="key-btn" title="Groq API Key" onclick="openKeyModal()">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
    </button>
    <button class="icon-btn" id="theme-btn" title="Toggle theme" onclick="toggleTheme()">
      <svg id="theme-icon" viewBox="0 0 24 24" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- ═══ KEY BANNER ═══ -->

<div id="key-banner">
  ⚡ Add your free <a onclick="openKeyModal()">Groq API key</a> to enable AI briefs on every article. Get one free at <a href="https://console.groq.com" target="_blank">console.groq.com</a>
</div>

<!-- ═══ TAB STRIP ═══ -->

<div id="tab-strip"></div>

<!-- ═══ CONTENT ═══ -->

<div id="content-wrap">
  <!-- Section header -->
  <div class="sec-hdr">
    <span class="sec-title" id="sec-title"></span>
    <span class="sec-src" id="sec-src"></span>
    <span class="sec-meta" id="sec-meta"></span>
    <button class="btn-refresh" onclick="refreshCat()">↻ Refresh</button>
  </div>

/* ═══════════════════════════════════════════
   3-PROXY CHAIN
═══════════════════════════════════════════ */
const PROXIES = [
  {
    name:"AllOrigins",
    fetch: async u=>{
      const r=await tFetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,9000);
      const d=await r.json();
      if(!d.contents) throw new Error("empty");
      return parseXML(d.contents);
    }
  },
  {
    name:"RSS2JSON",
    fetch: async u=>{
      const r=await tFetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}&count=15`,9000);
      const d=await r.json();
      if(d.status!=="ok"||!d.items?.length) throw new Error("bad");
      return d.items.map(i=>({
        title:i.title||"",link:i.link||"",description:i.description||i.content||"",
        pubDate:i.pubDate||"",author:i.author||"",guid:i.guid||i.link||""
      }));
    }
  },
  {
    name:"CORSProxy",
    fetch: async u=>{
      const r=await tFetch(`https://corsproxy.io/?${encodeURIComponent(u)}`,9000);
      return parseXML(await r.text());
    }
  },
];

async function tFetch(url,ms){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}

function parseXML(xml){
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  const items=Array.from(doc.querySelectorAll("item"));
  if(!items.length) throw new Error("no items");
  return items.slice(0,16).map(item=>{
    function g(tag){
      let el;try{el=item.querySelector(tag)}catch{}
      if(!el)el=item.getElementsByTagName(tag)[0];
      if(!el&&tag.includes(":"))el=item.getElementsByTagName(tag.split(":")[1])[0];
      return el?el.textContent.trim():"";
    }
    let link=g("link");
    if(!link){const l=item.getElementsByTagName("link")[0];if(l)link=l.getAttribute("href")||l.textContent.trim();}
    return{
      title:g("title"),link,
      description:g("description")||g("summary")||g("encoded")||g("content"),
      pubDate:g("pubDate")||g("published")||g("updated")||g("date"),
      author:g("author")||g("creator"),guid:g("guid")||link
    };
  }).filter(i=>i.title&&i.link);
}

async function loadOne(feed){
  for(const px of PROXIES){
    try{
      const items=await px.fetch(feed.url);
      if(items.length){
        items.forEach(i=>{i._src=feed.name;i._lang=feed.lang||"en";});
        return{items:items.slice(0,8),source:feed.name,proxy:px.name};
      }
    }catch(e){console.warn(`[${px.name}] ${feed.name}:`,e.message);}
  }
  return null;
}

async function loadCat(catId){
  const cat=CATS.find(c=>c.id===catId);
  if(cat.mixed){
    const results=await Promise.allSettled(cat.feeds.map(f=>loadOne(f)));
    let all=[];const srcs=new Set();
    for(const r of results){
      if(r.status==="fulfilled"&&r.value){
        all.push(...r.value.items);srcs.add(r.value.source);
      }
    }
    if(!all.length) throw new Error("all failed");
    all.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));
    const seen=new Set();
    all=all.filter(i=>{
      const k=(i.title||"").slice(0,42).toLowerCase().replace(/\s+/g,"");
      if(seen.has(k))return false;seen.add(k);return true;
    });
    return{items:all.slice(0,16),source:[...srcs].join(" · "),proxy:"mixed"};
  }
  for(const feed of cat.feeds){
    const r=await loadOne(feed);
    if(r)return{items:r.items.slice(0,14),source:r.source,proxy:r.proxy};
  }
  throw new Error("all failed");
}

/* ═══════════════════════════════════════════
   GROQ AI BRIEF
═══════════════════════════════════════════ */
async function doAI(eid){
  const key=getKey();
  if(!key){toast("⚠ Add your Groq API key first");openKeyModal();return;}

  const cat=CATS.find(c=>c.id===activeId);
  const items=cache[activeId]?.items||[];
  const article=items.find(a=>enc(a.guid||a.link)===eid);
  if(!article)return;

  busy.add(eid);
  const btn=document.getElementById("btn-"+eid);
  if(btn){btn.disabled=true;btn.innerHTML=`<span class="spin">◌</span> Analysing…`;}

  const ctxMap={world:"international",india:"national Indian",ap:"Andhra Pradesh regional",tg:"Telangana regional",ai:"global AI & technology"};
  const ctx=ctxMap[cat.region]||"Indian";
  const teArt=isTe(article.title)||article._lang==="te";
  const langNote=teArt?" The article is in Telugu — read it and write your entire analysis in clear English.":"";
  const body=strip(article.description||"").slice(0,900);

  const prompt=`You are a sharp ${ctx} news analyst.${langNote}

Write exactly 3 crisp sentences — no labels, no bullet points:
1. Core fact: what happened?
2. Significance: why does it matter?
3. Watch next: what should readers follow?

TITLE: ${article.title}
CONTENT: ${body}`;

  try{
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"user",content:prompt}],max_tokens:280,temperature:.65})
    });
    if(r.status===401)throw new Error("Invalid Groq key — check your key");
    if(!r.ok)throw new Error("Groq error "+r.status);
    const d=await r.json();
    summaries[eid]=d.choices?.[0]?.message?.content?.trim()||"Summary unavailable.";
    toast("✓ AI brief ready");
  }catch(e){
    summaries[eid]=null;toast("✗ "+e.message);
    if(e.message.includes("Invalid"))checkKey();
  }finally{
    busy.delete(eid);
    if(cache[activeId])render(cache[activeId]);
  }
}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
function doSearch(q){
  const ql=q.toLowerCase();
  let all=[];
  for(const id in cache){
    const cat=CATS.find(c=>c.id===id);
    cache[id].items.forEach(a=>{
      if((a.title||"").toLowerCase().includes(ql)||(a._src||"").toLowerCase().includes(ql)){
        all.push({...a,_catLabel:cat.label,_catCc:cat.cc,_catRegion:cat.region});
      }
    });
  }

  const sr=document.getElementById("search-results");
  const content=document.getElementById("content");
  sr.classList.add("show");content.style.display="none";
  document.querySelector(".sec-hdr").style.display="none";

  if(!all.length){
    sr.innerHTML=`<div class="state-box"><div class="state-icon">🔍</div><div class="state-msg">No results for "<strong>${esc(q)}</strong>" in loaded articles.<br>Try switching tabs to load more categories.</div></div>`;
    return;
  }

  sr.innerHTML=`
    <div class="search-hdr" style="padding:12px 14px 0">${all.length} results for "<strong>${esc(q)}</strong>"</div>
    <div class="art-grid" style="margin:10px 12px">
      ${all.map((a,i)=>{
        const id=enc(a.guid||a.link);
        const sum=summaries[id],bz=busy.has(id);
        return `
          <div class="art-card" style="animation-delay:${i*.03}s">
            <div class="art-meta">
              ${lbadge(a)}
              <span class="cat-badge ${a._catCc}">${a._catLabel.replace(/^[^ ]+ /,"")}</span>
              <span class="date-badge" style="margin-left:auto">${fmtDate(a.pubDate)}</span>
            </div>
            <div class="art-headline">${esc(a.title)}</div>
            <div class="art-desc">${esc(strip(a.description))}</div>
            ${sum?aiPanel(sum,a._catRegion):""}
            <div class="art-actions">
              <button class="btn-ai r-${a._catRegion}" id="btn-${id}" ${bz?"disabled":""} onclick="activeId='${a._catId||activeId}';doAI('${id}')">${bz?`<span class="spin">◌</span>`:sum?"↻":"⚡"} AI</button>
              <a class="btn-read" href="${esc(a.link)}" target="_blank" rel="noopener">Read →</a>
            </div>
          </div>`;
      }).join("")}
    </div>`;
}

function clearSearch(){
  document.getElementById("search-results").classList.remove("show");
  document.getElementById("content").style.display="";
  const sh=document.querySelector(".sec-hdr");if(sh)sh.style.display="";
}

/* ═══════════════════════════════════════════
   BOOKMARKS
═══════════════════════════════════════════ */
function isBookmarked(id){return bookmarks.some(b=>b.id===id)}

function toggleBM(id){
  const items=cache[activeId]?.items||[];
  const article=items.find(a=>enc(a.guid||a.link)===id);
  if(!article)return;

  if(isBookmarked(id)){
    bookmarks=bookmarks.filter(b=>b.id!==id);
    toast("Bookmark removed");
  }else{
    bookmarks.unshift({id,title:article.title,link:article.link,src:article._src||"",date:article.pubDate,saved:Date.now()});
    if(bookmarks.length>50)bookmarks=bookmarks.slice(0,50);
    toast("📌 Bookmarked!");
  }
  localStorage.setItem("brief_bm",JSON.stringify(bookmarks));
  updateBMBadge();
  if(cache[activeId])render(cache[activeId]);
}

function updateBMBadge(){
  const badge=document.getElementById("bm-badge");
  badge.textContent=bookmarks.length;
  badge.style.display=bookmarks.length?"flex":"none";
}

function openBM(){
  const drawer=document.getElementById("bm-drawer");
  const list=document.getElementById("bm-list");
  if(!bookmarks.length){list.innerHTML=`<div class="bm-empty">No saved articles yet.<br>Tap 🔖 on any article to save it.</div>`;}
  else{
    list.innerHTML=bookmarks.map(b=>`
      <div class="bm-item">
        <div class="bm-item-title">${esc(b.title)}</div>
        <div class="bm-item-meta">
          <span>${esc(b.src)}</span>
          <span>${fmtDate(b.date)}</span>
        </div>
        <div class="bm-item-actions">
          <a class="btn-read" style="font-size:.68rem;padding:5px 10px" href="${esc(b.link)}" target="_blank" rel="noopener">Read →</a>
          <button class="btn-clr" style="font-size:.68rem;padding:5px 10px" onclick="removeBM('${b.id}')">Remove</button>
        </div>
      </div>`).join("");
  }
  drawer.classList.add("open");
}

function removeBM(id){
  bookmarks=bookmarks.filter(b=>b.id!==id);
  localStorage.setItem("brief_bm",JSON.stringify(bookmarks));
  updateBMBadge();
  openBM();
  if(cache[activeId])render(cache[activeId]);
}

function closeBM(){document.getElementById("bm-drawer").classList.remove("open")}

/* ═══════════════════════════════════════════
   LOADING / ERROR STATES
═══════════════════════════════════════════ */
function showSkeleton(){
  document.getElementById("content").innerHTML=`
    <div class="skeleton-wrap">
      <div class="skel skel-hero"></div>
      <div class="skel-grid">
        ${Array(6).fill(`<div class="skel skel-card"></div>`).join("")}
      </div>
    </div>`;
}

function showError(){
  document.getElementById("sec-src").textContent="";
  document.getElementById("content").innerHTML=`
    <div class="state-box">
      <div class="state-icon">📡</div>
      <div class="state-title">Could Not Load Feeds</div>
      <div class="state-msg">All RSS sources and proxies were tried.<br>Check your internet and tap Refresh.</div>
      <button class="state-btn" onclick="refreshCat()">↻ Try Again</button>
    </div>`;
}

/* ═══════════════════════════════════════════
   API KEY
═══════════════════════════════════════════ */
function getKey(){return localStorage.getItem(SKEY)||""}

function checkKey(){
  const has=!!getKey();
  document.getElementById("key-banner").classList.toggle("hidden",has);
  document.getElementById("clear-btn").style.display=has?"":"none";
}

function openKeyModal(){
  document.getElementById("key-modal-input").value=getKey();
  document.getElementById("key-modal").classList.add("open");
  keyModalOpen=true;
  setTimeout(()=>document.getElementById("key-modal-input").focus(),100);
}

function closeKeyModal(){
  document.getElementById("key-modal").classList.remove("open");
  keyModalOpen=false;
}

function saveKeyFromModal(){
  const v=document.getElementById("key-modal-input").value.trim();
  if(!v){toast("Please enter your Groq API key");return;}
  localStorage.setItem(SKEY,v);
  checkKey();closeKeyModal();toast("✓ Groq key saved — AI briefs enabled!");
}

function clearKey(){
  localStorage.removeItem(SKEY);
  document.getElementById("key-modal-input").value="";
  checkKey();closeKeyModal();toast("Key cleared");
}

/* ═══════════════════════════════════════════
   DARK MODE
═══════════════════════════════════════════ */
function loadTheme(){
  const saved=localStorage.getItem("brief_theme")||"light";
  document.documentElement.setAttribute("data-theme",saved);
  updateThemeIcon(saved);
}

function toggleTheme(){
  const current=document.documentElement.getAttribute("data-theme");
  const next=current==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("brief_theme",next);
  updateThemeIcon(next);
}

function updateThemeIcon(theme){
  const icon=document.getElementById("theme-icon");
  icon.innerHTML=theme==="dark"
    ?`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`
    :`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastT;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),3000);
}

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
function isTe(s){return /[\u0C00-\u0C7F]/.test(s||"")}
function lbadge(item){
  const te=isTe(item.title)||item._lang==="te";
  return te?`<span class="lang-badge lb-te">తె</span>`:`<span class="lang-badge lb-en">EN</span>`;
}
function strip(h){return(h||"").replace(/<[^>]*>/g,"").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&#\d+;/g,"").replace(/\s+/g," ").trim()}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function enc(s){
  if(!s)return"x"+Math.random().toString(36).slice(2,10);
  let h=5381;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;
  return"id"+Math.abs(h).toString(36).padStart(8,"0");
}
function fmtDate(s){
  try{
    const d=new Date(s);
    const now=new Date();
    const diff=now-d;
    if(diff<3600000)return Math.floor(diff/60000)+"m ago";
    if(diff<86400000)return Math.floor(diff/3600000)+"h ago";
    return d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});
  }catch{return""}
}

// Keyboard shortcut for key modal
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&keyModalOpen) saveKeyFromModal();
});
</script>
