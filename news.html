<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRIEF. — Indian News Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=Fira+Code:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07090c;
      --surface:  #0d1017;
      --surface2: #121720;
      --border:   #1a2030;
      --saffron:  #f5820a;
      --saffron-dk: #7a3d00;
      --saffron-lt: #ffaa45;
      --india-green: #138808;
      --india-green-lt: #1db810;
      --navy:     #000080;
      --text:     #ddd8cc;
      --sub:      #8a8580;
      --muted:    #45433e;
      --green:    #3ddc84;
      --red:      #ff5c5c;
      --tg-blue:  #4a9eff;
      --ap-gold:  #ffd447;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(26,32,48,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,32,48,0.5) 1px, transparent 1px);
      background-size: 48px 48px;
      background-attachment: fixed;
    }

    /* ── MASTHEAD ── */
    #masthead {
      background: rgba(7,9,12,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .mast-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px 32px 0;
    }
    .mast-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    /* Tricolor stripe on brand */
    .brand-wrap { display: flex; flex-direction: column; gap: 0; }
    .tricolor-bar {
      height: 3px;
      width: 100%;
      background: linear-gradient(to right, #FF9933 33.3%, #FFFFFF 33.3% 66.6%, #138808 66.6%);
      margin-bottom: 3px;
    }
    .brand {
      font-family: 'Fraunces', serif;
      font-size: 2.1rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1;
    }
    .brand .dot { color: var(--saffron); }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 0.58rem;
      color: var(--green);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .datestamp {
      font-family: 'Fira Code', monospace;
      font-size: 0.6rem;
      color: var(--sub);
      letter-spacing: 0.06em;
    }

    .mast-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    #key-status {
      font-family: 'Fira Code', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
    }
    #key-status.no-key  { background:rgba(255,92,92,.1);  color:var(--red);   border:1px solid rgba(255,92,92,.3); }
    #key-status.has-key { background:rgba(61,220,132,.08); color:var(--green); border:1px solid rgba(61,220,132,.25); }

    #key-toggle {
      font-family: 'Fira Code', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      background: var(--surface2);
      color: var(--saffron);
      border: 1px solid var(--saffron-dk);
      cursor: pointer;
      transition: all 0.15s;
    }
    #key-toggle:hover { background: var(--saffron); color: var(--bg); }

    /* Key drawer */
    #key-drawer {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #key-drawer.open { max-height: 80px; }
    .key-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .key-label { font-family:'Fira Code',monospace; font-size:0.6rem; color:var(--saffron); letter-spacing:0.1em; white-space:nowrap; }
    #groq-key-input {
      flex: 1; max-width: 480px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family:'Fira Code',monospace; font-size:0.68rem;
      padding: 7px 12px; outline: none; transition: border-color 0.2s;
    }
    #groq-key-input:focus { border-color: var(--saffron); }
    #groq-key-input::placeholder { color: var(--muted); }
    .btn-save-key {
      padding:7px 16px; background:var(--saffron); color:var(--bg);
      border:none; font-family:'Fira Code',monospace; font-size:0.6rem;
      letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-weight:500;
    }
    .btn-save-key:hover { background:var(--saffron-lt); }
    .btn-clear-key {
      padding:7px 10px; background:transparent; color:var(--red);
      border:1px solid rgba(255,92,92,.3); font-family:'Fira Code',monospace;
      font-size:0.6rem; cursor:pointer;
    }
    .btn-clear-key:hover { background:rgba(255,92,92,.1); }

    /* ── CATEGORY TABS ── */
    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      border-top: 1px solid var(--border);
      margin-top: 2px;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 10px 18px;
      font-family: 'Fira Code', monospace;
      font-size: 0.61rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      position: relative;
      bottom: -1px;
    }
    .tab:hover { color: var(--sub); }
    .tab.active { color: var(--saffron); border-bottom-color: var(--saffron); }

    /* Special accent for regional tabs */
    .tab[data-region="ap"].active  { color: var(--ap-gold);  border-bottom-color: var(--ap-gold); }
    .tab[data-region="tg"].active  { color: var(--tg-blue);  border-bottom-color: var(--tg-blue); }

    /* ── MAIN ── */
    #main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 32px;
    }

    .sec-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }
    .sec-icon { font-size: 1.1rem; }
    .sec-title {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .sec-rule { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
    .sec-source {
      font-family: 'Fira Code', monospace;
      font-size: 0.55rem;
      color: var(--sub);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .sec-meta {
      font-family: 'Fira Code', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .btn-refresh {
      padding: 5px 12px;
      background: var(--surface2);
      color: var(--sub);
      border: 1px solid var(--border);
      font-family: 'Fira Code', monospace;
      font-size: 0.58rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-refresh:hover { color: var(--saffron); border-color: var(--saffron-dk); }

    /* ── GRID ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(355px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.15s;
      animation: cardIn 0.3s ease backwards;
    }
    .card:hover { background: var(--surface2); }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(7px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Regional tint on card left border */
    .card.region-ap  { border-left: 3px solid rgba(255,212,71,0.3); }
    .card.region-tg  { border-left: 3px solid rgba(74,158,255,0.3); }
    .card.region-india { border-left: 3px solid rgba(245,130,10,0.3); }

    .card-meta { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }

    .source-tag {
      font-family: 'Fira Code', monospace;
      font-size: 0.53rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid;
    }
    /* colour per region */
    .tag-ap     { color:var(--ap-gold);  border-color:rgba(255,212,71,0.3);  background:rgba(255,212,71,0.06); }
    .tag-tg     { color:var(--tg-blue);  border-color:rgba(74,158,255,0.3);  background:rgba(74,158,255,0.06); }
    .tag-india  { color:var(--saffron);  border-color:rgba(245,130,10,0.3);  background:rgba(245,130,10,0.06); }
    .tag-world  { color:#c084fc;         border-color:rgba(192,132,252,0.3); background:rgba(192,132,252,0.06); }
    .tag-biz    { color:#34d399;         border-color:rgba(52,211,153,0.3);  background:rgba(52,211,153,0.06); }
    .tag-sport  { color:#f87171;         border-color:rgba(248,113,113,0.3); background:rgba(248,113,113,0.06); }
    .tag-tech   { color:#60a5fa;         border-color:rgba(96,165,250,0.3);  background:rgba(96,165,250,0.06); }
    .tag-health { color:#a78bfa;         border-color:rgba(167,139,250,0.3); background:rgba(167,139,250,0.06); }

    .pub-date {
      font-family: 'Fira Code', monospace;
      font-size: 0.53rem;
      color: var(--muted);
      margin-left: auto;
    }
    .outlet-name {
      font-family: 'Fira Code', monospace;
      font-size: 0.53rem;
      color: var(--sub);
      letter-spacing: 0.05em;
    }

    .headline {
      font-family: 'Fraunces', serif;
      font-size: 1.04rem;
      font-weight: 700;
      line-height: 1.38;
      color: var(--text);
    }
    .desc {
      font-size: 0.78rem;
      color: var(--sub);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── AI PANEL ── */
    .ai-panel {
      background: #050810;
      border: 1px solid var(--saffron-dk);
      border-left: 3px solid var(--saffron);
      padding: 13px 16px;
      animation: fadeSlide 0.3s ease;
    }
    .ai-panel.region-ap { border-left-color: var(--ap-gold); border-color: rgba(255,212,71,0.25); }
    .ai-panel.region-tg { border-left-color: var(--tg-blue); border-color: rgba(74,158,255,0.25); }
    @keyframes fadeSlide {
      from { opacity:0; transform:translateY(-4px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .ai-header { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
    .ai-label {
      font-family: 'Fira Code', monospace;
      font-size: 0.53rem;
      color: var(--saffron);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .ai-panel.region-ap .ai-label { color: var(--ap-gold); }
    .ai-panel.region-tg .ai-label { color: var(--tg-blue); }
    .groq-badge {
      font-family: 'Fira Code', monospace;
      font-size: 0.48rem;
      color: var(--muted);
      margin-left: auto;
      letter-spacing: 0.08em;
    }
    .ai-text {
      font-size: 0.79rem;
      line-height: 1.75;
      color: #bbb5aa;
      font-style: italic;
    }

    /* ── CARD ACTIONS ── */
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .btn {
      padding: 6px 13px;
      font-family: 'Fira Code', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }
    .btn-ai { background:var(--saffron); color:var(--bg); font-weight:500; }
    .btn-ai:hover:not(:disabled) { background:var(--saffron-lt); }
    .btn-ai:disabled { background:var(--saffron-dk); color:#333; cursor:not-allowed; }
    .btn-ai.region-ap { background:var(--ap-gold); color:#111; }
    .btn-ai.region-ap:hover:not(:disabled) { background:#ffe57a; }
    .btn-ai.region-tg { background:var(--tg-blue); color:#fff; }
    .btn-ai.region-tg:hover:not(:disabled) { background:#6ab4ff; }
    .btn-read { background:var(--surface2); color:var(--sub); border:1px solid var(--border); }
    .btn-read:hover { color:var(--text); border-color:var(--sub); }

    /* ── SKELETON ── */
    #skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(355px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .skel-card { background:var(--surface); padding:22px; display:flex; flex-direction:column; gap:12px; }
    .skel {
      border-radius: 2px;
      background: linear-gradient(90deg, #0f1520 25%, #141c2c 50%, #0f1520 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── ERROR / EMPTY ── */
    .state-msg {
      padding: 80px 40px;
      text-align: center;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 2.2;
    }
    .state-msg .icon { font-size: 2rem; display:block; margin-bottom:12px; }

    /* ── SPINNER ── */
    .spin { display:inline-block; animation:rot 0.8s linear infinite; }
    @keyframes rot { to { transform:rotate(360deg); } }

    /* ── FEED SELECTOR NOTICE ── */
    .feed-notice {
      font-family: 'Fira Code', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      padding: 6px 0 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feed-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom:24px; right:24px;
      background: var(--surface2); border:1px solid var(--border);
      border-left: 3px solid var(--saffron);
      color: var(--text); font-family:'Fira Code',monospace;
      font-size: 0.62rem; letter-spacing:0.04em;
      padding: 10px 16px; z-index:9999;
      opacity:0; transform:translateY(8px);
      transition: all 0.25s; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateY(0); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--muted); }

    /* ── RESPONSIVE ── */
    @media(max-width:680px){
      .mast-inner { padding:12px 16px 0; }
      #main { padding:18px 14px; }
      .brand { font-size:1.7rem; }
      .datestamp { display:none; }
      #grid, #skeleton-grid { grid-template-columns:1fr; }
      .key-inner { flex-wrap:wrap; }
    }
  </style>

</head>

  {
    id: "world", label: "World", icon: "🌍", region: "world",
    tagClass: "tag-world",
    feeds: [
      { url: "https://feeds.feedburner.com/ndtvnews-world-news",                  name: "NDTV World" },
      { url: "https://feeds.bbci.co.uk/news/world/rss.xml",                       name: "BBC World" },
    ]
  },
];

/* ── CONSTANTS ───────────────────────────────────────── */
const RSS2JSON    = "https://api.rss2json.com/v1/api.json?rss_url=";
const GROQ_URL    = "https://api.groq.com/openai/v1/chat/completions";
const GROQ_MODEL  = "llama-3.3-70b-versatile";
const STORAGE_KEY = "brief_groq_key";

/* ── STATE ───────────────────────────────────────────── */
let activeId   = "india";
let cache      = {};        // id → { items, sourceName }
let summaries  = {};        // encodedId → text
let busy       = new Set();
let keyOpen    = false;

/* ── INIT ────────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", () => {
  setDatestamp();
  buildTabs();
  loadKey();
  selectCategory("india");
  setInterval(setDatestamp, 1000);
});

function setDatestamp() {
  const d = new Date();
  document.getElementById("datestamp").textContent =
    d.toLocaleDateString("en-IN", { weekday:"short", day:"numeric", month:"short", year:"numeric" }) +
    "  ·  " +
    d.toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:true });
}

/* ── TABS ────────────────────────────────────────────── */
function buildTabs() {
  document.getElementById("tabs").innerHTML = CATS.map(c => `
    <button class="tab${c.id === activeId ? " active" : ""}"
            id="tab-${c.id}"
            data-region="${c.region}"
            onclick="selectCategory('${c.id}')">
      ${c.icon} ${c.label}
    </button>`).join("");
}

function setActiveTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  const t = document.getElementById("tab-" + id);
  if (t) t.classList.add("active");
}

/* ── CATEGORY SELECT ─────────────────────────────────── */
function selectCategory(id) {
  activeId = id;
  const cat = CATS.find(c => c.id === id);
  document.getElementById("sec-icon").textContent = cat.icon;
  document.getElementById("sec-title").textContent = cat.label;
  setActiveTab(id);

  if (cache[id]) {
    renderGrid(cache[id].items, cache[id].sourceName, cat);
  } else {
    fetchNews(id);
  }
}

function refreshCategory() {
  delete cache[activeId];
  fetchNews(activeId);
}

/* ── FETCH RSS (with fallbacks) ──────────────────────── */
async function fetchNews(catId) {
  const cat = CATS.find(c => c.id === catId);
  showSkeleton();
  document.getElementById("sec-meta").textContent = "";
  document.getElementById("feed-info").textContent = "Searching feeds…";

  for (const feed of cat.feeds) {
    try {
      const res  = await fetch(`${RSS2JSON}${encodeURIComponent(feed.url)}&count=15`);
      const data = await res.json();
      if (data.status === "ok" && data.items && data.items.length > 0) {
        const items = data.items.slice(0, 12);
        cache[catId] = { items, sourceName: feed.name };
        if (catId === activeId) renderGrid(items, feed.name, cat);
        return; // success
      }
    } catch { /* try next feed */ }
  }

  // All failed
  if (catId === activeId) {
    document.getElementById("feed-info").textContent = "";
    showError("Could not load any feed for this category.<br>Check your connection or try Refresh.");
  }
}

/* ── RENDER ──────────────────────────────────────────── */
function renderGrid(articles, sourceName, cat) {
  document.getElementById("feed-info").textContent = "via " + sourceName;
  document.getElementById("sec-meta").textContent  = articles.length + " stories";

  document.getElementById("content").innerHTML =
    `<div id="grid">${articles.map((a, i) => cardHTML(a, i, cat)).join("")}</div>`;
}

function cardHTML(a, i, cat) {
  const id    = encodeId(a.guid || a.link);
  const desc  = stripHtml(a.description || "");
  const date  = formatDate(a.pubDate);
  const sum   = summaries[id];
  const isBsy = busy.has(id);
  const reg   = cat.region;

  const aiPanel = sum ? `
    <div class="ai-panel region-${reg}">
      <div class="ai-header">
        <span class="ai-label">⚡ Groq Intelligence Brief</span>
        <span class="groq-badge">llama-3.3-70b</span>
      </div>
      <div class="ai-text">${escHtml(sum)}</div>
    </div>` : "";

  const aiBtnLabel = isBsy
    ? `<span class="spin">◌</span> Analysing…`
    : sum ? `↻ Re-Analyse` : `⚡ AI Brief`;

  return `
    <div class="card region-${reg}" style="animation-delay:${i * 0.04}s">
      <div class="card-meta">
        <span class="source-tag ${cat.tagClass}">${cat.icon} ${cat.label}</span>
        ${a.author ? `<span class="outlet-name">${escHtml(a.author.slice(0,30))}</span>` : ""}
        <span class="pub-date">${date}</span>
      </div>
      <div class="headline">${escHtml(a.title)}</div>
      <div class="desc">${escHtml(desc)}</div>
      ${aiPanel}
      <div class="card-actions">
        <button class="btn btn-ai region-${reg}"
                id="btn-${id}"
                ${isBsy ? "disabled" : ""}
                onclick="handleSummarise('${id}')">
          ${aiBtnLabel}
        </button>
        <a class="btn btn-read" href="${escHtml(a.link)}" target="_blank" rel="noopener">
          Read Full →
        </a>
      </div>
    </div>`;
}

/* ── GROQ SUMMARISE ──────────────────────────────────── */
async function handleSummarise(encodedId) {
  const key = getKey();
  if (!key) {
    toast("⚠ Add your free Groq API key first");
    toggleKeyDrawer(true);
    return;
  }

  const cat      = CATS.find(c => c.id === activeId);
  const articles = cache[activeId]?.items || [];
  const article  = articles.find(a => encodeId(a.guid || a.link) === encodedId);
  if (!article) return;

  busy.add(encodedId);
  updateBtnLoading(encodedId, true);

  const bodyText = stripHtml(article.description || article.content || "").slice(0, 900);

  const regionContext = {
    ap: "This is Andhra Pradesh regional news from India.",
    tg: "This is Telangana regional news from India.",
    india: "This is national Indian news.",
    world: "This is international world news.",
  }[cat.region] || "";

  const prompt = `You are a sharp senior news analyst. ${regionContext}

Analyse the article below and write exactly 3 precise sentences (no labels, no preamble):
1. Core fact — what happened?
2. Significance — why does it matter to Indian readers?
3. Watch next — what should one monitor going forward?

TITLE: ${article.title}
DATE: ${article.pubDate}
CONTENT: ${bodyText}`;

  try {
    const res = await fetch(GROQ_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${key}`,
      },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [{ role: "user", content: prompt }],
        max_tokens: 300,
        temperature: 0.65,
      }),
    });

    if (res.status === 401) throw new Error("Invalid Groq API key");
    if (!res.ok) throw new Error("Groq API error " + res.status);

    const data = await res.json();
    const text = data.choices?.[0]?.message?.content?.trim() || "Summary unavailable.";
    summaries[encodedId] = text;
    toast("✓ AI brief ready");
  } catch (e) {
    summaries[encodedId] = null;
    toast("✗ " + (e.message || "Failed"));
    if (e.message?.includes("Invalid")) updateKeyStatus(false);
  } finally {
    busy.delete(encodedId);
    if (cache[activeId]) renderGrid(cache[activeId].items, cache[activeId].sourceName, CATS.find(c => c.id === activeId));
  }
}

function updateBtnLoading(id, loading) {
  const btn = document.getElementById("btn-" + id);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading
    ? `<span class="spin">◌</span> Analysing…`
    : `⚡ AI Brief`;
}

/* ── UI STATES ───────────────────────────────────────── */
function showSkeleton() {
  document.getElementById("content").innerHTML =
    `<div id="skeleton-grid">${Array.from({length:6}, () => `
      <div class="skel-card">
        <div class="skel" style="height:7px;width:38%"></div>
        <div class="skel" style="height:15px;width:93%"></div>
        <div class="skel" style="height:15px;width:75%"></div>
        <div class="skel" style="height:11px;width:65%"></div>
        <div class="skel" style="height:11px;width:80%"></div>
        <div class="skel" style="height:11px;width:52%"></div>
      </div>`).join("")}</div>`;
}

function showError(msg) {
  document.getElementById("content").innerHTML =
    `<div class="state-msg"><span class="icon">⚠</span>${msg}</div>`;
}

/* ── API KEY ─────────────────────────────────────────── */
function loadKey() {
  const k = localStorage.getItem(STORAGE_KEY) || "";
  if (k) { document.getElementById("groq-key-input").value = k; updateKeyStatus(true); }
  else   { updateKeyStatus(false); }
}
function getKey() { return localStorage.getItem(STORAGE_KEY) || ""; }
function saveKey() {
  const v = document.getElementById("groq-key-input").value.trim();
  if (!v) { toast("Enter a valid key"); return; }
  localStorage.setItem(STORAGE_KEY, v);
  updateKeyStatus(true);
  toggleKeyDrawer(false);
  toast("✓ Groq key saved");
}
function clearKey() {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById("groq-key-input").value = "";
  updateKeyStatus(false);
  toast("Key cleared");
}
function updateKeyStatus(has) {
  const el = document.getElementById("key-status");
  el.className = has ? "has-key" : "no-key";
  el.textContent = has ? "✓ Key Active" : "No API Key";
}
function toggleKeyDrawer(force) {
  keyOpen = force !== undefined ? force : !keyOpen;
  document.getElementById("key-drawer").classList.toggle("open", keyOpen);
  if (keyOpen) document.getElementById("groq-key-input").focus();
}

/* ── TOAST ───────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

/* ── UTILS ───────────────────────────────────────────── */
function stripHtml(h) { return (h||"").replace(/<[^>]*>/g,"").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").trim(); }
function escHtml(s)   { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function encodeId(s)  { try { return btoa(unescape(encodeURIComponent(s||Math.random()))).replace(/[^a-zA-Z0-9]/g,"").slice(0,24); } catch{ return Math.random().toString(36).slice(2); } }
function formatDate(s){ try{ return new Date(s).toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",hour12:true}); }catch{return "";} }

/* ── KEYBOARD ────────────────────────────────────────── */
document.addEventListener("keydown", e => {
  if (e.key==="Enter" && document.activeElement.id==="groq-key-input") saveKey();
  if (e.key==="Escape" && keyOpen) toggleKeyDrawer(false);
});
</script>

</body>
</html>
